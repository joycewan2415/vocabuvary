<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單字召喚師：傳說卡冊</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { 
            --primary: #6c5ce7; --gold: #f1c40f; --purple: #a29bfe; 
            --rarity1: #b2bec3; --rarity2: #55efc4; --rarity3: #0984e3; --rarity4: #6c5ce7; --rarity5: #d63031;
        }
        body { font-family: 'PingFang TC', sans-serif; background: #2d3436; color: white; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; min-height: 100vh; background: #1e272e; padding: 20px; box-sizing: border-box; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* 頂部狀態列 */
        .status-bar { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .pt-val { color: var(--gold); font-weight: bold; }
        .pity-val { font-size: 0.8rem; color: #aaa; }

        /* 卡片與網格 */
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .card-slot { aspect-ratio: 2/3; background: #2f3640; border-radius: 8px; position: relative; overflow: hidden; border: 2px solid transparent; }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-slot.owned .card-img { opacity: 1; }
        .stars { position: absolute; top: 2px; left: 2px; font-size: 10px; color: var(--gold); display: flex; }
        
        /* 抽卡結果特效 */
        .gacha-result-overlay { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .new-card-card { animation: cardPop 0.5s ease backwards; }
        @keyframes cardPop { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* 稀有特效 */
        .rarity-5-glow { box-shadow: 0 0 15px var(--rarity5); border: 2px solid var(--rarity5) !important; animation: glow 1s infinite alternate; }
        @keyframes glow { from { filter: brightness(1); } to { filter: brightness(1.5); } }

        /* 按鈕 */
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-gacha { background: linear-gradient(45deg, #6c5ce7, #a29bfe); border-bottom: 4px solid #4834d4; }
        .btn-gacha:active { transform: translateY(2px); border-bottom: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <div><span class="pt-val" id="pt-count">0</span> PT</div>
        <div class="pity-val">保底進度: <span id="pity-count">0</span>/50</div>
    </div>

    <div id="page-home" class="page active">
        <h1 style="text-align:center;">🗡️ 單字召喚師</h1>
        <button class="btn" style="height:80px; font-size:1.2rem; background:#27ae60;" onclick="startQuiz()">進入修煉 (賺點數)</button>
        <button class="btn" onclick="showPage('page-shop')">前往商店</button>
        <button class="btn" onclick="openCollection()" style="background:#f39c12;">卡冊成就</button>
    </div>

    <div id="page-shop" class="page">
        <h2>💎 召喚商店</h2>
        <div style="background:#2f3640; padding:20px; border-radius:15px; text-align:center;">
            <h3>高級召喚包</h3>
            <p>內容物：隨機卡片 x 5</p>
            <p style="color:var(--gold);">價格：200 PT</p>
            <button class="btn btn-gacha" onclick="pullGacha()">購買並召喚</button>
        </div>
        <div id="gacha-display" class="gacha-result-overlay"></div>
        <button class="btn" onclick="showPage('page-home')" style="background:#636e72;">返回</button>
    </div>

    <div id="page-collection" class="page">
        <h2>📜 卡冊 <span id="col-stat" style="font-size:1rem;"></span></h2>
        <div class="card-grid" id="col-grid"></div>
        <button class="btn" onclick="showPage('page-home')">返回</button>
    </div>
</div>

<script>
    // --- 遊戲資料 ---
    let state = JSON.parse(localStorage.getItem('summoner_db')) || {
        points: 500,
        pity: 0,
        collection: [] // 儲存格式: {id: 1, star: 5}
    };

    function save() {
        localStorage.setItem('summoner_db', JSON.stringify(state));
        document.getElementById('pt-count').innerText = state.points;
        document.getElementById('pity-count').innerText = state.pity;
    }

    // --- 抽卡邏輯 ---
    const getStar = () => {
        state.pity++;
        if (state.pity >= 50) { // 保底
            state.pity = 0;
            return 5;
        }
        const r = Math.random() * 100;
        if (r < 1) { state.pity = 0; return 5; } // 1%
        if (r < 6) return 4;  // 5%
        if (r < 20) return 3; // 14%
        if (r < 50) return 2; // 30%
        return 1;             // 50%
    };

    function pullGacha() {
        if (state.points < 200) return alert("點數不足！");
        state.points -= 200;
        
        const results = [];
        const display = document.getElementById('gacha-display');
        display.innerHTML = "";

        for (let i = 0; i < 5; i++) {
            const star = getStar();
            const cardId = Math.floor(Math.random() * 200) + 1;
            const isDup = state.collection.some(c => c.id === cardId);
            
            results.push({ id: cardId, star });

            if (isDup) {
                state.points += 100; // 重複返還 50%
            } else {
                state.collection.push({ id: cardId, star });
            }

            // 建立顯示元件
            const cardEl = document.createElement('div');
            cardEl.className = `card-slot new-card-card ${star === 5 ? 'rarity-5-glow' : ''}`;
            cardEl.style.animationDelay = `${i * 0.1}s`;
            cardEl.innerHTML = `
                <img src="https://picsum.photos/id/${cardId+50}/200/300" class="card-img">
                <div class="stars">${'⭐'.repeat(star)}</div>
                ${isDup ? '<div style="position:absolute; top:40%; width:100%; text-align:center; background:rgba(0,0,0,0.7); font-size:10px;">REWARD +100</div>' : ''}
            `;
            display.appendChild(cardEl);
        }
        save();
    }

    // --- 卡冊顯示 ---
    function openCollection() {
        showPage('page-collection');
        const grid = document.getElementById('col-grid');
        grid.innerHTML = "";
        
        // 依照星級排序
        state.collection.sort((a,b) => b.star - a.star);
        document.getElementById('col-stat').innerText = `(${state.collection.length}/200)`;

        state.collection.forEach(card => {
            const slot = document.createElement('div');
            slot.className = `card-slot owned ${card.star === 5 ? 'rarity-5-glow' : ''}`;
            slot.innerHTML = `
                <img src="https://picsum.photos/id/${card.id+50}/200/300" class="card-img">
                <div class="stars">${'⭐'.repeat(card.star)}</div>
            `;
            grid.appendChild(slot);
        });
    }

    // --- 頁面切換 ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 模擬測驗獲得點數
    function startQuiz() {
        const win = confirm("測驗結束！獲得 100 分。領取 100 PT 獎勵？");
        if(win) { state.points += 100; save(); }
    }

    save(); // 初始化介面
</script>
</body>
</html>
