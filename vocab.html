<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>單字召喚師 - 遺忘曲線試煉</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* 繼承 V11 樣式並新增內容 */
        :root { 
            --primary: #a29bfe; --gold: #ffeaa7; --bg: #1e272e;
            --r1: #dcdde1; --r2: #55efc4; --r3: #74b9ff; --r4: #a29bfe; --r5: #ff7675;
            --danger: #ff4757;
        }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        .container { width: 100%; max-width: 500px; min-height: 100vh; background: #2d3436; padding: 15px; box-sizing: border-box; margin: 0 auto; display: flex; flex-direction: column; }
        
        .page { display: none; animation: fadeIn 0.4s ease; flex-grow: 1; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* 頂部狀態 */
        .status-header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #444; position: sticky; top: 10px; z-index: 100; }
        .pt-box { color: var(--gold); font-weight: bold; }

        /* 警告標籤 */
        .alert-banner { background: var(--danger); color: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* 單字熟練度條 */
        .mastery-bar { height: 4px; background: #555; border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .mastery-fill { height: 100%; background: var(--r2); transition: 0.3s; }

        /* 按鈕與卡片 (維持 V11) */
        .btn { background: var(--primary); color: #2d3436; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .gacha-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .card-vanilla { aspect-ratio: 2/3; border-radius: 12px; border: 2px solid #555; background: #000; position: relative; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .card-img { width: 100%; height: 75%; object-fit: cover; border-bottom: 1px solid #444; }
        
        /* 預覽 Overlay */
        #preview-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #preview-img { width: 90%; max-width: 400px; border-radius: 20px; border: 3px solid white; }

        .item-card { background: #3d444b; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .quiz-q { font-size: 2.5rem; text-align: center; margin: 30px 0; font-weight: bold; color: var(--primary); }
        .opt-btn { background: white; color: #2d3436; border: 2px solid #ddd; padding: 15px; border-radius: 12px; margin-top: 10px; width: 100%; text-align: left; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="preview-overlay" onclick="this.style.display='none'">
    <img id="preview-img" src="">
</div>

<div class="container">
    <div class="status-header">
        <div class="pt-box"><span class="material-icons" style="vertical-align:bottom">auto_awesome</span> <span id="pt-display">0</span></div>
        <div style="font-size: 0.8rem; color: #aaa;">遺忘警戒: <span id="weak-count" style="color:var(--r5)">0</span></div>
    </div>

    <div id="recall-alert" class="alert-banner">
        <span class="material-icons">report_problem</span>
        <span>弱點單字過多，召喚功能已鎖定！請先進行「弱點消除」。</span>
    </div>

    <div id="page-home" class="page active">
        <h1 style="text-align:center; margin: 20px 0;">召喚師圖鑑 V12</h1>
        <button class="btn" onclick="startQuizFlow(false)" style="background:#55efc4;"><span class="material-icons">psychology</span>一般修煉</button>
        <button class="btn" onclick="startQuizFlow(true)" style="background:var(--r5); color:white;"><span class="material-icons">history_edu</span>弱點消除 (Redemption)</button>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">
            <button class="btn" onclick="showPage('page-groups')"><span class="material-icons">folder</span>分組</button>
            <button id="shop-btn" class="btn" onclick="showPage('page-shop')" style="background:#fab1a0;"><span class="material-icons">auto_fix_high</span>召喚</button>
        </div>
        <button class="btn" onclick="showPage('page-col-menu')" style="background:var(--gold); margin-top:12px;"><span class="material-icons">collections_bookmark</span>卡冊</button>
    </div>

    <div id="page-groups" class="page">
        <div style="display:flex; align-items:center; gap:10px;"><span class="material-icons" onclick="showPage('page-home')">arrow_back</span><h2>分組管理</h2></div>
        <div style="display:flex; gap:10px;"><input type="text" id="new-group-name" style="flex:1; padding:10px; border-radius:8px; border:none;"><button class="btn" onclick="createGroup()" style="margin:0; width:50px;">+</button></div>
        <div id="group-list" style="margin-top:20px;"></div>
    </div>

    <div id="page-words" class="page">
        <div style="display:flex; align-items:center; gap:10px;"><span class="material-icons" onclick="showPage('page-groups')">arrow_back</span><h2 id="cur-group-title">單字列表</h2></div>
        <div style="background:#3d444b; padding:12px; border-radius:12px; margin-bottom:15px;">
            <input type="text" id="in-eng" placeholder="英文" style="width:100%; margin-bottom:8px; padding:8px;">
            <input type="text" id="in-chi" placeholder="中文" style="width:100%; margin-bottom:8px; padding:8px;">
            <button class="btn" onclick="addWord()">儲存</button>
        </div>
        <div id="word-list"></div>
    </div>

    <div id="page-shop" class="page">
        <div style="display:flex; align-items:center; gap:10px;"><span class="material-icons" onclick="showPage('page-home')">arrow_back</span><h2>女神召喚</h2></div>
        <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; text-align:center;">
            <div style="font-size:1.5rem; color:var(--gold); font-weight:bold; margin-bottom:10px;">200 PT / 5連</div>
            <button class="btn" onclick="drawGacha()" style="background:linear-gradient(45deg, #a29bfe, #6c5ce7); color:white;">啟動儀式</button>
        </div>
        <div id="gacha-res" class="gacha-grid"></div>
    </div>

    <div id="page-col-menu" class="page">
        <div style="display:flex; align-items:center; gap:10px;"><span class="material-icons" onclick="showPage('page-home')">arrow_back</span><h2>卡冊</h2></div>
        <div id="col-group-container"></div>
    </div>
    <div id="page-col-detail" class="page">
        <div style="display:flex; align-items:center; gap:10px;"><span class="material-icons" onclick="showPage('page-col-menu')">arrow_back</span><h2 id="col-detail-title">詳情</h2></div>
        <div id="col-detail-grid" class="gacha-grid"></div>
    </div>
    <div id="page-quiz" class="page">
        <h3 id="quiz-progress" style="text-align:center;">第 1 題</h3>
        <div class="quiz-q" id="quiz-q">Word</div>
        <div id="quiz-opts"></div>
    </div>
</div>

<script>
    // --- 資料結構更新 ---
    let state = JSON.parse(localStorage.getItem('vocab_summon_v12')) || {
        pt: 600, pity: 0, groups: {}, collection: []
    };

    const CATEGORIES = [
        { id: 'girl', name: '少女', color: '#fd79a8', api: 'https://nekos.best/api/v2/waifu' },
        { id: 'beast', name: '幻獸', color: '#e17055', api: 'https://nekos.best/api/v2/kitsune' }
    ];

    function save() {
        localStorage.setItem('vocab_summon_v12', JSON.stringify(state));
        updateHeader();
    }

    function updateHeader() {
        document.getElementById('pt-display').innerText = state.pt;
        // 計算弱點單字：答錯 >= 3 次 且 熟練度低於 60%
        let weakCount = 0;
        Object.values(state.groups).forEach(g => {
            g.forEach(w => { if((w.wrong || 0) - (w.correct || 0) >= 2) weakCount++; });
        });
        document.getElementById('weak-count').innerText = weakCount;
        
        // 限制召喚功能
        const isLocked = weakCount >= 5;
        document.getElementById('recall-alert').style.display = isLocked ? 'flex' : 'none';
        document.getElementById('shop-btn').disabled = isLocked;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'page-groups') renderGroups();
        if(id === 'page-col-menu') renderColMenu();
    }

    // --- 單字處理 (新增統計欄位) ---
    function addWord() {
        let eng = document.getElementById('in-eng').value.trim();
        let chi = document.getElementById('in-chi').value.trim();
        if(!eng || !chi) return;
        state.groups[curGroup].push({
            eng, chi, correct: 0, wrong: 0, lastTime: Date.now()
        });
        save(); renderWords();
        document.getElementById('in-eng').value = ""; document.getElementById('in-chi').value = "";
    }

    function renderWords() {
        document.getElementById('word-list').innerHTML = state.groups[curGroup].map((w, i) => {
            let score = (w.correct || 0) - (w.wrong || 0);
            let percent = Math.max(10, Math.min(100, 50 + score * 10));
            return `
            <div class="item-card">
                <div style="display:flex; justify-content:space-between;">
                    <b>${w.eng}</b>
                    <span style="font-size:0.7rem; color:#aaa;">錯: ${w.wrong || 0} / 對: ${w.correct || 0}</span>
                </div>
                <div>${w.chi}</div>
                <div class="mastery-bar"><div class="mastery-fill" style="width:${percent}%; background:${percent<50?'var(--r5)':'var(--r2)'}"></div></div>
            </div>`;
        }).join('');
    }

    // --- 強化測驗邏輯 ---
    let qPool=[], qIdx=0, isRedemption=false;
    function startQuizFlow(redemptionMode) {
        isRedemption = redemptionMode;
        let allWords = [];
        Object.values(state.groups).forEach(g => allWords.push(...g));
        if(allWords.length < 4) return alert("單字不夠！");

        if(isRedemption) {
            // 只選出錯誤次數 > 正確次數的單字
            qPool = allWords.filter(w => (w.wrong || 0) > (w.correct || 0));
            if(qPool.length === 0) return alert("目前沒有弱點單字，女神很滿意！");
        } else {
            // 一般模式：隨機選 10 個
            qPool = allWords.sort(() => 0.5 - Math.random()).slice(0, 10);
        }
        
        qIdx = 0; showPage('page-quiz'); renderQuiz();
    }

    function renderQuiz() {
        if(qIdx >= qPool.length) {
            alert(isRedemption ? "弱點消除完成！召喚功能已更新。" : "修煉結束！");
            save(); showPage('page-home'); return;
        }
        let cur = qPool[qIdx];
        document.getElementById('quiz-progress').innerText = `${isRedemption?'重修':'挑戰'}中: ${qIdx+1}/${qPool.length}`;
        document.getElementById('quiz-q').innerText = cur.eng;
        
        let allChi = [];
        Object.values(state.groups).forEach(g => allChi.push(...g.map(w=>w.chi)));
        let opts = [cur.chi, ...[...new Set(allChi)].filter(c=>c!==cur.chi).sort(()=>0.5-Math.random()).slice(0,3)].sort(()=>0.5-Math.random());
        document.getElementById('quiz-opts').innerHTML = opts.map(o => `
            <button class="opt-btn" onclick="checkQuiz('${o}','${cur.chi}')">${o}</button>
        `).join('');
    }

    function checkQuiz(p, r) {
        // 找到原始單字物件進行更新
        let wordObj;
        Object.values(state.groups).forEach(g => {
            let found = g.find(w => w.eng === qPool[qIdx].eng);
            if(found) wordObj = found;
        });

        if(p === r) {
            wordObj.correct = (wordObj.correct || 0) + 1;
            state.pt += (isRedemption ? 5 : 20); // 弱點消除 PT 較少，目的是解鎖
        } else {
            wordObj.wrong = (wordObj.wrong || 0) + 1;
        }
        wordObj.lastTime = Date.now();
        qIdx++; renderQuiz();
    }

    // --- 召喚與預覽 (同 V11，僅加入 check) ---
    async function drawGacha() {
        if(state.pt < 200) return alert("PT點數不足！");
        state.pt -= 200;
        const grid = document.getElementById('gacha-res');
        grid.innerHTML = "召喚中...";
        
        let tasks = [];
        for(let i=0; i<5; i++){
            let star = Math.random()<0.03 ? 5 : (Math.random()<0.1 ? 4 : (Math.random()<0.3 ? 3 : 2));
            let cat = CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)];
            tasks.push({ star, cat });
        }

        const cards = await Promise.all(tasks.map(async t => {
            const res = await fetch(t.cat.api);
            const data = await res.json();
            return { ...t, url: data.results[0].url };
        }));

        grid.innerHTML = "";
        cards.forEach(c => {
            state.collection.push(c);
            const el = document.createElement('div');
            el.className = `card-vanilla ${c.star === 5 ? 'rare-5' : ''}`;
            el.onclick = () => {
                document.getElementById('preview-img').src = c.url;
                document.getElementById('preview-overlay').style.display = 'flex';
            };
            el.innerHTML = `<img src="${c.url}" class="card-img" loading="lazy">
                <div class="card-info"><div class="card-stars">${'⭐'.repeat(c.star)}</div></div>`;
            grid.appendChild(el);
        });
        save();
    }

    // 基礎渲染與初始化
    function createGroup() { let n=document.getElementById('new-group-name').value; if(n){state.groups[n]=[]; save(); renderGroups();}}
    function renderGroups() { document.getElementById('group-list').innerHTML = Object.keys(state.groups).map(g => `<div class="item-card" onclick="curGroup='${g}'; showPage('page-words'); renderWords();"><b>${g}</b> (${state.groups[g].length})</div>`).join(''); }
    function renderColMenu() { 
        document.getElementById('col-group-container').innerHTML = [5,4,3,2,1].map(s => `<div class="btn" onclick="viewCollection(${s})">${s}星卡冊 (${state.collection.filter(c=>c.star==s).length})</div>`).join('');
    }
    function viewCollection(s) {
        showPage('page-col-detail');
        const grid = document.getElementById('col-detail-grid');
        grid.innerHTML = state.collection.filter(c=>c.star==s).map(c => `<div class="card-vanilla"><img src="${c.url}" class="card-img" onclick="document.getElementById('preview-img').src='${c.url}';document.getElementById('preview-overlay').style.display='flex';"></div>`).join('');
    }

    save();
</script>
</body>
</html>
